#cloud-config
package_update: true
package_upgrade: true

# Install essential base dependencies
packages:
  - curl
  - git
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - ufw

runcmd:
  # ---------------------------------------------------------------------------
  # 1. Install Docker & Docker Compose
  # ---------------------------------------------------------------------------
  - echo "=== Installing Docker ==="
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # ---------------------------------------------------------------------------
  # 2. Install Caddy Web Server
  # ---------------------------------------------------------------------------
  - echo "=== Installing Caddy ==="
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install -y caddy
  - systemctl enable --now caddy

  # ---------------------------------------------------------------------------
  # 3. Secure System Firewall (UFW)
  # ---------------------------------------------------------------------------
  - echo "=== Setting Up Firewall ==="
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # ---------------------------------------------------------------------------
  # 4. Final Notification
  # ---------------------------------------------------------------------------
  - echo "=== Server Boot & Provisioning Completed Successfully ==="
